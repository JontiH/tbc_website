name: Sync Cloudflare Access Policy

# Runs nightly + can be triggered manually from the Actions tab
on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = midnight Toronto (EDT)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch member emails from Worker and update Access policy
        env:
          CF_TOKEN:     ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT:   "7679249973b3ca7cd658c198c69e1e5e"
          CF_APP_ID:    "40f844bc-ff6b-4669-9ec7-22b4a52cf825"
          CF_POLICY_ID: "d4a7448f-d652-4b66-b8da-a687077ab066"
          WORKER_URL:   "https://tbc-sheets-worker.jbhmario.workers.dev"
        run: |
          set -euo pipefail

          echo "Fetching member list from Worker..."
          MEMBERS=$(curl -sf "$WORKER_URL/members")

          EMAIL_COUNT=$(echo "$MEMBERS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          emails = [r['Email'].strip() for r in data['rows'] if r.get('Email','').strip()]
          print(len(emails))
          ")
          echo "Found $EMAIL_COUNT members with email addresses"

          echo "Building policy payload..."
          PAYLOAD=$(echo "$MEMBERS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          rules = [{'email': {'email': r['Email'].strip()}} for r in data['rows'] if r.get('Email','').strip()]
          print(json.dumps({
              'name': 'TBC Members',
              'decision': 'allow',
              'precedence': 1,
              'include': rules
          }))
          ")

          echo "Updating Cloudflare Access policy..."
          RESPONSE=$(curl -sf -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/access/apps/$CF_APP_ID/policies/$CF_POLICY_ID" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          SUCCESS=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('success', False))")
          if [ "$SUCCESS" != "True" ]; then
            echo "ERROR: Cloudflare API returned failure:"
            echo "$RESPONSE" | python3 -m json.tool
            exit 1
          fi

          echo "Access policy updated successfully with $EMAIL_COUNT allowed emails."
