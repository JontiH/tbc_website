name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'worker/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build
        env:
          HIVE_WORKER_URL: https://tbc-sheets-worker.jbhmario.workers.dev

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=tbc-website --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 7679249973b3ca7cd658c198c69e1e5e
